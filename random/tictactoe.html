<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #6bcbff; }

    .cell.win { background: #0f3460; }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #a0c4ff;
      border-radius: 6px;
      background: transparent;
      color: #a0c4ff;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #reset:hover {
      background: #a0c4ff;
      color: #1a1a2e;
    }

    #scores {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box span { font-size: 1.8rem; font-weight: bold; display: block; }
    .score-box .x-color { color: #ff6b6b; }
    .score-box .o-color { color: #6bcbff; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box">
      <span class="x-color" id="score-x">0</span>
      Player X
    </div>
    <div class="score-box">
      <span id="draws">0</span>
      Draws
    </div>
    <div class="score-box">
      <span class="o-color" id="score-o">0</span>
      Player O
    </div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, draws: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = Number(cell.dataset.i);
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(i => cells[i].classList.add('win'));
        status.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draws++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }));

    document.getElementById('reset').addEventListener('click', resetGame);

    function checkWin() {
      return WINS.find(([a,b,c]) =>
        board[a] && board[a] === board[b] && board[b] === board[c]
      ) || null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('draws').textContent = scores.draws;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      status.textContent = "Player X's turn";
    }
  </script>
</body>
</html>
